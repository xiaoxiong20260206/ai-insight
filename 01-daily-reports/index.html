<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 调研日报</title>
    <style>
        :root {
            --color-success: #1A7F37;
            --gradient-success: linear-gradient(135deg, #1A7F37, #2DA44E);
            --font-family: -apple-system,"system-ui","Segoe UI","Noto Sans SC",Helvetica,Arial,sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-family); background:#F6F8FA; color:#1F2328; font-size:15px; line-height:1.65; }
        .container { max-width:720px; margin:0 auto; padding:24px 20px; }
        .header { background:var(--gradient-success); color:#fff; border-radius:14px; padding:28px 32px; margin-bottom:24px; }
        .header h1 { font-size:26px; font-weight:800; margin-bottom:6px; }
        .header p { font-size:14px; opacity:.85; }
        .stats { display:flex; gap:12px; margin-bottom:24px; }
        .stat { flex:1; background:#fff; border:1px solid #E8ECF0; border-radius:10px; padding:16px; text-align:center; }
        .stat-value { font-size:24px; font-weight:800; color:var(--color-success); }
        .stat-label { font-size:12px; color:#656D76; margin-top:4px; }
        .section { background:#fff; border:1px solid #E8ECF0; border-radius:14px; padding:24px; margin-bottom:16px; }
        .section-title { font-size:16px; font-weight:700; margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid #E8ECF0; }
        .report-item { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid #E8ECF0; }
        .report-item:last-child { border-bottom:none; }
        .report-item a { color:#1F2328; text-decoration:none; font-weight:600; font-size:15px; }
        .report-item a:hover { color:var(--color-success); }
        .report-badge { display:inline-block; padding:2px 8px; border-radius:999px; font-size:11px; font-weight:600; }
        .badge-daily { background:#EFFDF5; color:var(--color-success); }
        .badge-weekly { background:#F5F3FF; color:#7C3AED; }
        .badge-latest { background:#FEF2F2; color:#CF222E; }
        .footer { text-align:center; padding:24px; font-size:12px; color:#656D76; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI 调研日报</h1>
            <p>每日自动调研 · 四大领域 · 国内外动态 · 大神观点追踪</p>
        </div>
        <div class="stats">
            <div class="stat"><div class="stat-value">1</div><div class="stat-label">日报</div></div>
            <div class="stat"><div class="stat-value">0</div><div class="stat-label">周报</div></div>
            <div class="stat"><div class="stat-value">2026-03-03</div><div class="stat-label">最新</div></div>
        </div>
        <div class="section">
            <div class="section-title">📰 日报</div>
            <div class="report-item"><a href="2026-03-03.html">2026-03-03</a><span class="report-badge badge-latest">最新</span></div>
        </div>
        <div class="footer">
            <p>AI 调研日报 · 自动生成 · Powered by CodeFlicker</p>
        </div>
    </div>
</body>
</html>

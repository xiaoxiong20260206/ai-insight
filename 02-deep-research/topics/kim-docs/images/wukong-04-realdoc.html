<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 1060px; 
            height: 420px; 
            overflow: hidden; 
            font-family: -apple-system, "SF Pro Display", "Noto Sans SC", sans-serif;
        }
        .container {
            width: 1060px;
            height: 420px;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #f0f9ff 100%);
            padding: 32px 40px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 28px;
            text-align: center;
        }
        .content {
            display: flex;
            gap: 32px;
        }
        .problems {
            flex: 1;
        }
        .problems-title {
            font-size: 16px;
            font-weight: 600;
            color: #dc2626;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .problem {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #fecaca;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .problem-icon {
            font-size: 24px;
        }
        .problem-content {
            flex: 1;
        }
        .problem-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .problem-desc {
            font-size: 12px;
            color: #64748b;
        }
        .problem-stat {
            font-size: 11px;
            color: #dc2626;
            background: #fef2f2;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 4px;
        }
        .solutions {
            flex: 1;
        }
        .solutions-title {
            font-size: 16px;
            font-weight: 600;
            color: #16a34a;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .solution {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #bbf7d0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .solution-icon {
            font-size: 24px;
        }
        .solution-content {
            flex: 1;
        }
        .solution-title {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .solution-desc {
            font-size: 12px;
            color: #64748b;
        }
        .solution-stat {
            font-size: 11px;
            color: #16a34a;
            background: #f0fdf4;
            padding: 4px 8px;
            border-radius: 4px;
            margin-top: 4px;
        }
        .arrow {
            display: flex;
            align-items: center;
            font-size: 32px;
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">📁 RealDoc：为AI重新设计的文件系统</div>
        <div class="content">
            <div class="problems">
                <div class="problems-title">❌ 传统文件系统的问题</div>
                <div class="problem">
                    <div class="problem-icon">💸</div>
                    <div class="problem-content">
                        <div class="problem-title">Token爆炸</div>
                        <div class="problem-desc">AI改一个词要读写整篇文档</div>
                        <div class="problem-stat">实测：做1个PPT消耗2.7亿Token≈$500</div>
                    </div>
                </div>
                <div class="problem">
                    <div class="problem-icon">🔄</div>
                    <div class="problem-content">
                        <div class="problem-title">无法回退</div>
                        <div class="problem-desc">覆盖写入即生效，改坏无存档</div>
                    </div>
                </div>
                <div class="problem">
                    <div class="problem-icon">📂</div>
                    <div class="problem-content">
                        <div class="problem-title">文件失控</div>
                        <div class="problem-desc">Agent随机创建文件，企业不知道AI在哪里生成了什么</div>
                    </div>
                </div>
            </div>
            <div class="arrow">→</div>
            <div class="solutions">
                <div class="solutions-title">✅ RealDoc的解决方案</div>
                <div class="solution">
                    <div class="solution-icon">🎯</div>
                    <div class="solution-content">
                        <div class="solution-title">原子级修改</div>
                        <div class="solution-desc">按行号、关键词定位，只动需要动的地方</div>
                        <div class="solution-stat">Token消耗直降90%+</div>
                    </div>
                </div>
                <div class="solution">
                    <div class="solution-icon">📸</div>
                    <div class="solution-content">
                        <div class="solution-title">自动快照</div>
                        <div class="solution-desc">每步操作自动保存版本，支持Diff对比</div>
                    </div>
                </div>
                <div class="solution">
                    <div class="solution-icon">🏠</div>
                    <div class="solution-content">
                        <div class="solution-title">文件归宿</div>
                        <div class="solution-desc">每个Agent独立云端工作空间，文件有"户口"</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

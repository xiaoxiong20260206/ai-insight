<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 1060px; 
            margin: 0;
            padding: 0;
            font-family: -apple-system, "SF Pro Display", "Noto Sans SC", sans-serif;
        }
        .container {
            width: 1060px;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #f0f9ff 100%);
            padding: 40px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 32px;
            text-align: center;
        }
        .timeline {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            padding: 0 20px;
        }
        .timeline::before {
            content: '';
            position: absolute;
            top: 40px;
            left: 80px;
            right: 80px;
            height: 4px;
            background: linear-gradient(90deg, #94a3b8, #2563eb);
            border-radius: 2px;
        }
        .era {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 200px;
            position: relative;
        }
        .era-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 16px;
            z-index: 1;
        }
        .era-circle.past {
            background: #f1f5f9;
            border: 3px solid #94a3b8;
        }
        .era-circle.now {
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border: 3px solid #2563eb;
            box-shadow: 0 4px 16px rgba(37,99,235,0.3);
        }
        .era-title {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .era-year {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
        }
        .era-desc {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
            line-height: 1.4;
        }
        .era-subject {
            background: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-top: 8px;
        }
        .era-subject.human { color: #64748b; border: 1px solid #e2e8f0; }
        .era-subject.ai { color: #2563eb; border: 1px solid #2563eb; background: #eff6ff; }
        .bottom-note {
            text-align: center;
            margin-top: 40px;
            padding: 16px 24px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .bottom-note strong { color: #2563eb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🔄 操作主体范式转移：从人到AI</div>
        <div class="timeline">
            <div class="era">
                <div class="era-circle past">💻</div>
                <div class="era-title">DOS时代</div>
                <div class="era-year">1981-1995</div>
                <div class="era-desc">人用机器语言<br>操作系统</div>
                <div class="era-subject human">操作主体：人</div>
            </div>
            <div class="era">
                <div class="era-circle past">🖱️</div>
                <div class="era-title">GUI时代</div>
                <div class="era-year">1995-2023</div>
                <div class="era-desc">机器生成界面<br>供人操作</div>
                <div class="era-subject human">操作主体：人</div>
            </div>
            <div class="era">
                <div class="era-circle past">💬</div>
                <div class="era-title">LUI时代</div>
                <div class="era-year">2023-2026</div>
                <div class="era-desc">人用自然语言<br>向AI下达指令</div>
                <div class="era-subject human">操作主体：人</div>
            </div>
            <div class="era">
                <div class="era-circle now">🤖</div>
                <div class="era-title">CLI时代</div>
                <div class="era-year">2026+</div>
                <div class="era-desc">AI直接调用<br>系统能力</div>
                <div class="era-subject ai">操作主体：AI</div>
            </div>
        </div>
        <div class="bottom-note">
            <strong>核心洞察</strong>：前三个时代，操作主体始终是人。2026年开始，<strong>操作主体变成AI</strong>——产品架构必须重新设计。
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 1060px; 
            height: 500px; 
            overflow: hidden; 
            font-family: -apple-system, "SF Pro Display", "Noto Sans SC", sans-serif;
        }
        .container {
            width: 1060px;
            height: 500px;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #f0f9ff 100%);
            padding: 32px 40px;
        }
        .title {
            font-size: 24px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 28px;
            text-align: center;
        }
        .comparison {
            display: flex;
            gap: 40px;
            justify-content: center;
        }
        .product {
            width: 420px;
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            border: 2px solid #e2e8f0;
        }
        .product.claw {
            border-color: #f97316;
        }
        .product.wukong {
            border-color: #2563eb;
        }
        .product-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f1f5f9;
        }
        .product-icon {
            font-size: 36px;
        }
        .product-info {
            flex: 1;
        }
        .product-name {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
        }
        .product-tagline {
            font-size: 13px;
            color: #64748b;
        }
        .product-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .claw .product-badge {
            background: #fff7ed;
            color: #f97316;
        }
        .wukong .product-badge {
            background: #eff6ff;
            color: #2563eb;
        }
        .features {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .feature {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .feature-label {
            width: 80px;
            font-size: 12px;
            color: #64748b;
        }
        .feature-value {
            flex: 1;
            font-size: 13px;
            color: #1e293b;
            font-weight: 500;
        }
        .claw .feature-value { color: #f97316; }
        .wukong .feature-value { color: #2563eb; }
        .vs {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #94a3b8;
        }
        .bottom-note {
            text-align: center;
            margin-top: 24px;
            padding: 14px 24px;
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 14px;
            color: #1e293b;
        }
        .bottom-note strong { color: #7c3aed; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">🔄 两种产品哲学的对比</div>
        <div class="comparison">
            <div class="product claw">
                <div class="product-header">
                    <div class="product-icon">🦞</div>
                    <div class="product-info">
                        <div class="product-name">OpenClaw</div>
                        <div class="product-tagline">AI领域的"Linux时刻"</div>
                    </div>
                    <div class="product-badge">开源自由</div>
                </div>
                <div class="features">
                    <div class="feature">
                        <div class="feature-label">核心命题</div>
                        <div class="feature-value">"能干活"</div>
                    </div>
                    <div class="feature">
                        <div class="feature-label">系统权限</div>
                        <div class="feature-value">完全Shell访问</div>
                    </div>
                    <div class="feature">
                        <div class="feature-label">安全策略</div>
                        <div class="feature-value">用户自负</div>
                    </div>
                    <div class="feature">
                        <div class="feature-label">文件操作</div>
                        <div class="feature-value">传统文件系统</div>
                    </div>
                    <div class="feature">
                        <div class="feature-label">适合谁</div>
                        <div class="feature-value">开发者/极客</div>
                    </div>
                </div>
            </div>
            <div class="vs">VS</div>
            <div class="product wukong">
                <div class="product-header">
                    <div class="product-icon">🐵</div>
                    <div class="product-info">
                        <div class="product-name">悟空</div>
                        <div class="product-tagline">企业级AI原生平台</div>
                    </div>
                    <div class="product-badge">企业安全</div>
                </div>
                <div class="features">
                    <div class="feature">
                        <div class="feature-label">核心命题</div>
                        <div class="feature-value">"能进公司"</div>
                    </div>
                    <div class="feature">
                        <div class="feature-label">系统权限</div>
                        <div class="feature-value">受控（DNA认证+沙箱）</div>
                    </div>
                    <div class="feature">
                        <div class="feature-label">安全策略</div>
                        <div class="feature-value">六层企业级架构</div>
                    </div>
                    <div class="feature">
                        <div class="feature-label">文件操作</div>
                        <div class="feature-value">RealDoc（AI原生）</div>
                    </div>
                    <div class="feature">
                        <div class="feature-label">适合谁</div>
                        <div class="feature-value">企业用户</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="bottom-note">
            <strong>"笼中龙虾"的产品哲学</strong>：悟空不是OpenClaw的"企业版"，它是对"AI产品该怎么建"这个问题的不同回答。
        </div>
    </div>
</body>
</html>
